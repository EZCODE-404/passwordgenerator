<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style> 
    body{
        text-align: center;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin-top: 50px;
    }
    #passwordDisplay{
        font-size: 24px;
        margin: 20px 0;
        word-break: break-all;
    }
    input{
        font-size: 18px;
        padding: 10px;
        margin: 5px;
        width: 200px;
    }
    button{
        font-size: 18px;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
    }
</style>
<body>
    <div>
<h1>random password generator</h1>
 <input type="text" id="length" placeholder="Enter password length" />
<button id="generate">Generate Password</button>
<p id="passwordDisplay"></p>    



    </div>
</body>
<script>
    let passwordDisplay = document.querySelector('#passwordDisplay');
    let lengthInput = document.querySelector('#length');
    let generateButton = document.querySelector('#generate');
    
    function generatePassword(length) {
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
        let password = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charset.length);
            password += charset[randomIndex];
        }
        return password;
    }
    
    generateButton.addEventListener('click', () => {
        const length = parseInt(lengthInput.value);
        if (isNaN(length) || length <= 0) {
            alert("Please enter a valid password length.");
            return;
        }
        const password = generatePassword(length);
        passwordDisplay.textContent = password;
    });

    savetolocalstorage = () => {
        const password = passwordDisplay.textContent;
        localStorage.setItem('generatedPassword', password);
        alert('Password saved to local storage!');      
    }
</script>
</html>
